services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  - type: web
    name: nyu-bites-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nyu-bites-db
          property: connectionString
      - key: REDIS_URL
        sync: false          # set manually from Upstash after deploy
      - key: SECRET_KEY
        generateValue: true  # Render generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: EMAIL_BACKEND
        value: console
      - key: FRONTEND_URL
        value: https://nyu-bites.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://nyu-bites.onrender.com
      - key: GROQ_API_KEY
        sync: false          # set manually — never commit API keys

  # ── React frontend (static site — no sleep on free tier) ──────────────────
  - type: web
    name: nyu-bites
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback
    envVars:
      - key: REACT_APP_API_URL
        value: https://nyu-bites-api.onrender.com/api/v1

# ── Managed PostgreSQL (free 90 days) ─────────────────────────────────────
databases:
  - name: nyu-bites-db
    plan: free
